<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Letter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="heart"></div>
      <h1>To the one I love so much</h1>
      <p class="subtitle">A note wrapped in warmth and sincerity.</p>
      <button id="reveal-button" class="button">Open your letter</button>
      <article id="letter" class="letter hidden" aria-live="polite">
        <p id="typed-text"></p>
      </article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
