<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Letter</title>
  <style>
    :root {
      --bg: #ffe8f1;
      --card: #fff0f8;
      --text: #4b1538;
      --accent: #da4167;
      --soft: #ffd8e4;
      --shadow: rgba(220, 85, 125, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #ffe4f0 0%, #f9c2d8 40%, #ffdfe8 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .page {
      width: min(100%, 680px);
    }

    .card {
      background: linear-gradient(135deg, var(--card), #fffaf5);
      border-radius: 32px;
      box-shadow: 0 24px 80px var(--shadow);
      padding: 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.45;
    }

    .card::before {
      width: 18rem;
      height: 18rem;
      background: radial-gradient(circle, #ffd9e7 0%, transparent 70%);
      top: -6rem;
      right: -5rem;
    }

    .card::after {
      width: 12rem;
      height: 12rem;
      background: radial-gradient(circle, #f5a6c4 0%, transparent 70%);
      bottom: -5rem;
      left: -4rem;
    }

    .heart {
      background-color: red;
      display: inline-block;
      height: 30px;
      margin: 0 10px;
      position: relative;
      top: 0;
      transform: rotate(-45deg);
      width: 30px;
      animation: pulse 1.6s infinite ease-in-out;
    }

    .heart:before,
    .heart:after {
      content: "";
      background-color: red;
      border-radius: 50%;
      height: 30px;
      position: absolute;
      width: 30px;
    }

    .heart:before {
      top: -15px;
      left: 0;
    }

    .heart:after {
      left: 15px;
      top: 0;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 1.8rem;
      color: #7c4969;
      font-size: 1rem;
      line-height: 1.8;
    }

    .button {
      border: none;
      cursor: pointer;
      background: #da4167;
      color: #fff;
      padding: 0.95rem 2rem;
      border-radius: 999px;
      font-size: 1rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      box-shadow: 0 16px 30px rgba(218, 65, 103, 0.18);
    }

    .button:hover {
      transform: translateY(-2px);
      background: #e1577d;
    }

    .letter {
      margin-top: 2rem;
      padding: 1.6rem;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      border: 1px solid rgba(218, 65, 103, 0.16);
      box-shadow: 0 18px 40px rgba(142, 71, 104, 0.12);
      text-align: left;
      min-height: 7rem;
    }

    .letter p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.8;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.08); }
    }

    @media (max-width: 520px) {
      .card {
        padding: 2rem 1.5rem;
      }
      .button {
        width: 100%;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="heart"></div>
      <h1>To the one I love so much</h1>
      <p class="subtitle">A note wrapped in warmth and sincerity.</p>
      <button id="reveal-button" class="button">Open your letter</button>
      <article id="letter" class="letter hidden" aria-live="polite">
        <p id="typed-text"></p>
      </article>
    </section>
  </main>
  <script>
    const button = document.getElementById('reveal-button');
    const letter = document.getElementById('letter');
    const typedText = document.getElementById('typed-text');

    const loveMessage = `My dearest Bebii,

From the moment our paths crossed, every ordinary day became brighter.
Your laughter is my favorite sound, and your smile is the light I carry with me.

I love you more than words can say, and this little letter is a gentle reminder that you are cherished, adored, and always loved.

Forever yours,
Your Bebii loves`;

    function typeLetter(text, element, speed = 35) {
      let index = 0;
      element.textContent = '';
      const interval = setInterval(() => {
        element.textContent += text[index];
        index += 1;
        if (index >= text.length) {
          clearInterval(interval);
        }
      }, speed);
    }

    button.addEventListener('click', () => {
      button.disabled = true;
      button.textContent = 'Sending love...';
      setTimeout(() => {
        letter.classList.remove('hidden');
        button.classList.add('hidden');
        typeLetter(loveMessage, typedText);
      }, 500);
    });
  </script>
</body>
</html>
